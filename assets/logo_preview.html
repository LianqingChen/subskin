<!DOCTYPE html>
<html>
<head>
    <title>SubSkin Logo Preview</title>
    <style>
        
/* Add rounded corners via CSS */
.rounded-logo {
    border-radius: 70px; /* Adjust as needed */
    overflow: hidden;
    display: inline-block;
}

.rounded-logo img {
    display: block;
    width: 100%;
    height: auto;
}

/* Circular version */
.circular-logo {
    border-radius: 50%;
    overflow: hidden;
    display: inline-block;
}

        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .preview { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SubSkin Logo Preview</h1>
        
        <div class="preview">
            <h2>Original</h2>
            <img src="subskin2.png" width="352" height="341">
        </div>
        
        <div class="preview">
            <h2>🎨 Rounded Corners (Image - Generated)</h2>
            <img src="subskin_logo.png" width="320" height="301" alt="SubSkin Rounded Logo">
            <p>Image file: <code>subskin_logo.png</code> (640×602 with 70px rounded corners, transparent background)</p>
        </div>
        
        <div class="preview">
            <h2>Rounded Corners (CSS)</h2>
            <div class="rounded-logo">
                <img src="subskin2.png" width="352" height="341">
            </div>
            <p>CSS: <code>border-radius: 70px;</code></p>
        </div>
        
        <div class="preview">
            <h2>Circular (CSS)</h2>
            <div class="circular-logo">
                <img src="subskin2.png" width="352" height="341">
            </div>
            <p>CSS: <code>border-radius: 50%;</code></p>
        </div>
    </div>
</body>
</html>
