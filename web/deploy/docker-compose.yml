version: '3.8'

services:
  frontend:
    image: nginx:alpine
    volumes:
      - ../vitepress/docs/.vitepress/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/subskin.db
    volumes:
      - ./data:/app/data
