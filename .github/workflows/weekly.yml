name: Weekly Content Generation

on:
  schedule:
    # Every Friday at 10:00 AM UTC (6:00 PM China time)
    - cron: '0 10 * * 5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for weekly content (YYYY-MM-DD)'
        required: false
        default: ''
      test_mode:
        description: 'Run in test mode with limited data'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-weekly:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,ai]"
    
    - name: Configure environment
      run: |
        # Create config directory if it doesn't exist
        mkdir -p configs
        
        # Create .env file from secrets
        cat > .env << EOF
        NCBI_API_KEY=${{ secrets.NCBI_API_KEY }}
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        SEMANTIC_SCHOLAR_API_KEY=${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
        SITE_URL=https://subskin.example.com
        EOF
        
        # Create test mode flag if specified
        if [ "${{ inputs.test_mode }}" = "true" ]; then
          echo "TEST_MODE=true" >> .env
          echo "MAX_PAPERS=10" >> .env
        fi
        
        # Set date if specified
        if [ -n "${{ inputs.date }}" ]; then
          echo "WEEKLY_DATE=${{ inputs.date }}" >> .env
        fi
    
    - name: Run weekly content generation
      run: |
        python scripts/generate_weekly.py \
          --date "${{ inputs.date || '' }}" \
          --test "${{ inputs.test_mode || 'false' }}" \
          --output web/vitepress/docs/weekly/
    
    - name: Build HTML for distribution
      run: |
        # Generate HTML version for email/social media
        python scripts/generate_weekly.py \
          --format html \
          --template web/templates/weekly-digest.html \
          --output dist/weekly/
    
    - name: Archive generated content
      uses: actions/upload-artifact@v4
      with:
        name: weekly-content-${{ github.run_id }}
        path: |
          web/vitepress/docs/weekly/
          dist/weekly/
        retention-days: 7
    
    - name: Deploy to preview site
      if: github.event_name == 'workflow_dispatch'
      run: |
        # For manual runs, deploy to preview site
        echo "Deploying to preview site..."
        # Add deployment logic here
    
    - name: Send email notification
      if: github.event.schedule == '0 10 * * 5' && inputs.test_mode != 'true'
      env:
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: |
        # Send email to subscribers
        python scripts/send_weekly_email.py \
          --smtp-host "$SMTP_HOST" \
          --smtp-port "$SMTP_PORT" \
          --smtp-user "$SMTP_USER" \
          --smtp-password "$SMTP_PASSWORD" \
          --template email_templates/weekly-digest.html
    
    - name: Create PR for generated content
      if: github.event.schedule == '0 10 * * 5' && inputs.test_mode != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Configure git
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Create new branch
        BRANCH_NAME="weekly/$(date +%Y-%m-%d)"
        git checkout -b "$BRANCH_NAME"
        
        # Add and commit generated content
        git add web/vitepress/docs/weekly/
        git commit -m "docs(weekly): add weekly digest for $(date +%Y-%m-%d)"
        
        # Push to remote
        git push origin "$BRANCH_NAME"
        
        # Create pull request
        gh pr create \
          --title "Weekly Digest: $(date +%Y-%m-%d)" \
          --body "Automatically generated weekly digest for $(date +%Y-%m-%d)" \
          --base main \
          --head "$BRANCH_NAME"
    
    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: "Weekly content generation failed",
            body: "The weekly content generation workflow failed. Please check the logs.",
            labels: ["bug", "automation"]
          });

  validate-content:
    runs-on: ubuntu-latest
    needs: generate-weekly
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download generated content
      uses: actions/download-artifact@v4
      with:
        name: weekly-content-${{ needs.generate-weekly.outputs.run_id }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Validate content
      run: |
        python scripts/validate_weekly.py \
          --input dist/weekly/ \
          --check-links \
          --check-images \
          --validate-html
    
    - name: Generate preview
      run: |
        # Generate a preview link or screenshot
        echo "Content validation complete"
        echo "Preview available at: https://preview.subskin.example.com/weekly/$(date +%Y-%m-%d)"
    
    - name: Upload validation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-report-${{ github.run_id }}
        path: validation-report.json